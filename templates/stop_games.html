<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Слова — Остановить игры</title>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{background:#0d0f14;color:#e2e8f0;font-family:'JetBrains Mono',monospace;min-height:100vh;padding:32px}
h1{font-size:1.5rem;font-weight:700;color:#4f8ef7;margin-bottom:8px}
.subtitle{color:#64748b;font-size:.8rem;margin-bottom:32px}
a.back{display:inline-block;color:#64748b;font-size:.8rem;text-decoration:none;margin-bottom:24px}
a.back:hover{color:#4f8ef7}
.toolbar{display:flex;align-items:center;gap:20px;margin-bottom:16px;flex-wrap:wrap}
.check-all-wrap{display:flex;align-items:center;gap:8px;font-size:.8rem;color:#64748b;cursor:pointer;user-select:none}
.check-all-wrap input{accent-color:#f87171;width:15px;height:15px;cursor:pointer}
button#stop-btn{background:#f87171;color:#0d0f14;border:none;border-radius:6px;padding:9px 22px;font-family:'JetBrains Mono',monospace;font-size:.85rem;font-weight:700;cursor:pointer;transition:opacity .15s}
button#stop-btn:hover{opacity:.85}
button#stop-btn:disabled{opacity:.4;cursor:not-allowed}
.selected-count{font-size:.75rem;color:#64748b}
table{width:100%;border-collapse:collapse;background:#151820;border:1px solid #1e2433;border-radius:8px;overflow:hidden}
thead{background:#1e2433}
th{padding:12px 16px;text-align:left;font-size:.7rem;color:#64748b;text-transform:uppercase;letter-spacing:.08em;font-weight:600}
td{padding:12px 16px;font-size:.85rem;border-top:1px solid #1e2433}
tr.game-row:hover td{background:#1a1f2e}
tr.game-row.stopped td{opacity:.4}
td input[type=checkbox]{accent-color:#f87171;width:15px;height:15px;cursor:pointer}
.status{font-size:.7rem;padding:3px 8px;border-radius:4px;font-weight:600}
.status-waiting{background:#1a3a5c;color:#4f8ef7}
.status-in_game{background:#1a3a2a;color:#3ecf8e}
.status-voting{background:#2a2a1a;color:#f0c040}
.badge-stopped{font-size:.7rem;color:#64748b;font-style:italic}
.loading{color:#64748b;font-size:.85rem;padding:20px 0}
.result{margin-top:20px;font-size:.85rem;padding:12px 16px;border-radius:6px;display:none}
.result.ok{background:#0d2a1e;border:1px solid #3ecf8e;color:#3ecf8e}
.result.err{background:#2a0d0d;border:1px solid #f87171;color:#f87171}
.empty{color:#64748b;font-size:.85rem;padding:20px 0}
</style>
</head>
<body>
<a class="back" href="/admin">← Назад</a>
<h1>🛑 Остановить игры</h1>
<p class="subtitle">Выберите игры для остановки</p>

<div class="toolbar">
  <label class="check-all-wrap">
    <input type="checkbox" id="check-all"> Выбрать все
  </label>
  <button id="stop-btn" disabled onclick="stopSelected()">Остановить выбранные</button>
  <span class="selected-count" id="selected-count"></span>
</div>

<div id="table-wrap"><p class="loading">Загрузка...</p></div>
<div class="result" id="result"></div>

<script>
let games = [];

async function load() {
  try {
    const r = await fetch('/api/admin/games?per_page=100');
    const d = await r.json();
    games = d.games.filter(g => g.status !== 'finished');
    render();
  } catch {
    document.getElementById('table-wrap').innerHTML =
      '<p class="empty">Ошибка загрузки</p>';
  }
}

function render() {
  if (!games.length) {
    document.getElementById('table-wrap').innerHTML =
      '<p class="empty">Нет активных игр</p>';
    return;
  }
  const rows = games.map(g => `
    <tr class="game-row" id="row-${g.id}">
      <td><input type="checkbox" class="game-cb" data-id="${g.id}" onchange="updateCount()"></td>
      <td>${g.id}</td>
      <td>${g.chat_id}</td>
      <td><span class="status status-${g.status}">${statusLabel(g.status)}</span></td>
      <td>${g.current_word || '—'}</td>
      <td>${g.players_count}</td>
      <td>${g.created_at ? g.created_at.slice(0,16).replace('T',' ') : '—'}</td>
    </tr>`).join('');
  document.getElementById('table-wrap').innerHTML = `
    <table>
      <thead><tr>
        <th></th><th>ID</th><th>Chat ID</th><th>Статус</th>
        <th>Текущее слово</th><th>Игроки</th><th>Создана</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>`;
  updateCount();
}

function statusLabel(s) {
  return {waiting:'Ожидание',in_game:'Идёт',voting:'Голосование'}[s] || s;
}

function updateCount() {
  const checked = document.querySelectorAll('.game-cb:checked');
  const total = document.querySelectorAll('.game-cb');
  document.getElementById('check-all').checked =
    total.length > 0 && checked.length === total.length;
  document.getElementById('check-all').indeterminate =
    checked.length > 0 && checked.length < total.length;
  document.getElementById('stop-btn').disabled = checked.length === 0;
  document.getElementById('selected-count').textContent =
    checked.length ? `Выбрано: ${checked.length}` : '';
}

document.getElementById('check-all').addEventListener('change', function() {
  document.querySelectorAll('.game-cb').forEach(cb => cb.checked = this.checked);
  updateCount();
});

async function stopSelected() {
  const ids = [...document.querySelectorAll('.game-cb:checked')].map(cb => +cb.dataset.id);
  if (!ids.length) return;

  const btn = document.getElementById('stop-btn');
  btn.disabled = true;
  btn.textContent = 'Останавливаю...';
  document.getElementById('result').style.display = 'none';

  let stopped = 0, failed = 0;
  for (const id of ids) {
    try {
      const r = await fetch(`/api/admin/games/${id}/stop`, {method:'POST'});
      const d = await r.json();
      if (d.ok) {
        stopped++;
        const row = document.getElementById(`row-${id}`);
        if (row) row.classList.add('stopped');
        const cb = document.querySelector(`.game-cb[data-id="${id}"]`);
        if (cb) cb.disabled = true;
      } else {
        failed++;
      }
    } catch {
      failed++;
    }
  }

  const res = document.getElementById('result');
  if (failed === 0) {
    res.className = 'result ok';
    res.textContent = `Остановлено: ${stopped} игр(ы)`;
  } else {
    res.className = 'result err';
    res.textContent = `Остановлено: ${stopped}, ошибок: ${failed}`;
  }
  res.style.display = 'block';
  btn.textContent = 'Остановить выбранные';
  updateCount();
}

load();
</script>
</body>
</html>
